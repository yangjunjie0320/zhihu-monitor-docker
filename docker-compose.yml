# RSSHub + Zhihu Monitor (Ofelia Scheduled Version)

services:
  # RSSHub service
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: always
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 300
      ZHIHU_COOKIES: ${ZHIHU_COOKIES}

  # Monitor container (kept running, scheduled by Ofelia to execute script)
  zhihu-monitor:
    build: .
    container_name: zhihu-monitor
    restart: always
    depends_on:
      - rsshub
    environment:
      RSSHUB_BASE: http://rsshub:1200
      WEBHOOK_URL: ${WEBHOOK_URL}
      ZHIHU_USER_ID: shui-qian-xiao-xi
      ZHIHU_USER_NAME: 马前卒official
      STATE_FILE: /data/state.json
      TZ: Asia/Shanghai
      DEBUG_MODE: ${DEBUG_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      - ./data:/data
    working_dir: /app
    # Keep container running
    command: ["sh", "-c", "echo 'Monitor container started. Waiting for Ofelia scheduler...' && sleep infinity"]
    labels:
      ofelia.enabled: "true"
      # Cron format: minute hour day month weekday
      # */5 means every 5 minutes (not 5 seconds)
      # For every 5 seconds, you would need: */5 * * * * * (6 fields with seconds)
      # But Ofelia uses standard cron (5 fields), so this is every 5 minutes
      ofelia.job-exec.monitor.schedule: "0 */10 * * *"
      ofelia.job-exec.monitor.command: "python -u /app/monitor.py"
      ofelia.job-exec.monitor.working-dir: "/app"

  # Ofelia scheduler
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ofelia
    restart: always
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      OFELIA_LOG_LEVEL: "info"
